<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115年全國登山步道票選活動 - 前台網站線稿 (V5)</title>
    <style>
        /* 基礎線稿樣式設定 */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; color: #333; }
        header { background-color: #fff; border-bottom: 2px solid #333; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 20px; font-weight: bold; border: 2px dashed #666; padding: 10px; background: #eee; border-radius: 8px;}
        .nav-container { display: flex; align-items: center; gap: 15px; }
        nav button { background: none; border: 1px solid #333; padding: 8px 12px; cursor: pointer; font-size: 15px; transition: all 0.2s; border-radius: 8px;}
        nav button.active, nav button:hover { background-color: #333; color: #fff; }
        
        .login-status { text-align: right; font-size: 13px; border-left: 1px solid #ccc; padding-left: 15px; }
        .votes-left { color: #d9534f; font-weight: bold; font-size: 15px; }

        main { max-width: 1000px; margin: 20px auto; background: #fff; border: 1px solid #ccc; min-height: 70vh; border-radius: 8px;}
        .page-section { display: none; padding: 30px; }
        .page-section.active { display: block; }
        h2 { border-bottom: 1px solid #ccc; padding-bottom: 10px; margin-top: 0; }
        
        .placeholder { border: 2px dashed #999; background-color: #eaeaea; display: flex; align-items: center; justify-content: center; color: #666; margin-bottom: 15px; border-radius: 8px;}
        .btn { background: #eee; border: 1px solid #333; padding: 8px 16px; text-align: center; cursor: pointer; box-sizing: border-box; border-radius: 8px;}
        .btn:hover { background: #ddd; }
        
        .filter-btn { margin-bottom: 8px; }
        .filter-btn.active, .frame-box.active { background-color: #333; color: #fff; border-color: #333; }
        .frame-box { width: 100px; height: 100px; cursor: pointer; text-align: center; border-radius: 8px;}

        /* 網格系統 (用於步道列表) */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { border: 1px solid #999; padding: 15px; display: flex; flex-direction: column; background: #fff; border-radius: 8px;}
        .card-title { font-weight: bold; margin-bottom: 10px; font-size: 18px; color: #2c3e50; }
        .card-text { font-size: 14px; color: #444; margin-bottom: 15px; flex-grow: 1; line-height: 1.6; }
        .card-text strong { color: #000; }
        
        /* 彈窗 (Modal) 樣式 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: #fff; margin: 5% auto; padding: 20px; border: 1px solid #888; width: 90%; max-width: 800px; border-radius: 12px; max-height: 85vh; overflow-y: auto; }
        .close-btn { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; margin-top: -10px;}
        .close-btn:hover { color: black; }
        
        /* 彈窗頁籤樣式 */
        .modal-tabs { display: flex; border-bottom: 1px solid #ccc; margin-bottom: 15px; background: #f4f4f4; border-radius: 8px 8px 0 0; overflow-x: auto; white-space: nowrap;}
        .modal-tab-btn { background: none; border: none; padding: 12px 20px; cursor: pointer; border-bottom: 3px solid transparent; font-size: 15px; color: #555;}
        .modal-tab-btn:hover { background: #e9e9e9; }
        .modal-tab-btn.active { background: #fff; border-bottom: 3px solid #5cb85c; font-weight: bold; color: #333; }
        .modal-tab-content { display: none; }
        .modal-tab-content.active { display: block; }
        
        /* 表單與表格樣式 */
        .info-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .info-table th, .info-table td { border: 1px solid #ddd; padding: 12px; text-align: left; vertical-align: top;}
        .info-table th { background-color: #f9f9f9; width: 120px; color: #666; font-weight: normal;}
